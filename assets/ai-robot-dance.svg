<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <circle cx="180" cy="80" r="120" fill="url(#glow)"/>
  <circle cx="1020" cy="250" r="140" fill="url(#glow)"/>

  <text x="600" y="58" text-anchor="middle" fill="#ffffff" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AI ROBOT DANCE MODE</text>
  <text x="600" y="92" text-anchor="middle" fill="#dbeafe" font-size="18" font-family="Segoe UI, Arial, sans-serif">Interactive vibe for a premium GitHub profile</text>

  <!-- Robot 1 -->
  <g transform="translate(300 190)">
    <rect x="-34" y="-78" width="68" height="54" rx="10" fill="#e2e8f0" stroke="#1e293b" stroke-width="3"/>
    <circle cx="-14" cy="-52" r="6" fill="#0ea5e9"/>
    <circle cx="14" cy="-52" r="6" fill="#0ea5e9"/>
    <rect x="-30" y="-18" width="60" height="58" rx="12" fill="#cbd5e1" stroke="#1e293b" stroke-width="3"/>
    <rect x="-58" y="-8" width="22" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="36" y="-8" width="22" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="-22" y="44" width="14" height="34" rx="6" fill="#cbd5e1"/>
    <rect x="8" y="44" width="14" height="34" rx="6" fill="#cbd5e1"/>
    <animateTransform attributeName="transform" type="translate" values="300 190;300 168;300 190" dur="1.4s" repeatCount="indefinite"/>
  </g>

  <!-- Robot 2 -->
  <g transform="translate(600 205)">
    <rect x="-36" y="-82" width="72" height="56" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="3"/>
    <circle cx="-15" cy="-55" r="6" fill="#22d3ee"/>
    <circle cx="15" cy="-55" r="6" fill="#22d3ee"/>
    <rect x="-32" y="-20" width="64" height="62" rx="12" fill="#e2e8f0" stroke="#0f172a" stroke-width="3"/>
    <rect x="-66" y="-10" width="24" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="42" y="-10" width="24" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="-22" y="46" width="14" height="34" rx="6" fill="#e2e8f0"/>
    <rect x="8" y="46" width="14" height="34" rx="6" fill="#e2e8f0"/>
    <animateTransform attributeName="transform" type="translate" values="600 205;600 180;600 205" dur="1.2s" repeatCount="indefinite"/>
  </g>

  <!-- Robot 3 -->
  <g transform="translate(900 190)">
    <rect x="-34" y="-78" width="68" height="54" rx="10" fill="#e2e8f0" stroke="#1e293b" stroke-width="3"/>
    <circle cx="-14" cy="-52" r="6" fill="#0ea5e9"/>
    <circle cx="14" cy="-52" r="6" fill="#0ea5e9"/>
    <rect x="-30" y="-18" width="60" height="58" rx="12" fill="#cbd5e1" stroke="#1e293b" stroke-width="3"/>
    <rect x="-58" y="-8" width="22" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="36" y="-8" width="22" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="-22" y="44" width="14" height="34" rx="6" fill="#cbd5e1"/>
    <rect x="8" y="44" width="14" height="34" rx="6" fill="#cbd5e1"/>
    <animateTransform attributeName="transform" type="translate" values="900 190;900 168;900 190" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <text x="600" y="292" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Segoe UI, Arial, sans-serif">French and English AI assistant • Animated visuals • Storytelling • Dashboard</text>
</svg>
